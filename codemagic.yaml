workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
      xcode: latest
    scripts:
      - name: Build KMP framework
        script: |
          chmod +x gradlew
          ./gradlew :composeApp:assembleComposeAppReleaseXCFramework

      - name: Install dependencies
        script: cd iosApp && pod install

      - name: Build iOS app
        script: |
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/ios/archive.xcarchive \
            archive

    artifacts:
      - build/ios/archive.xcarchive/**