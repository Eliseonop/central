workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      vars:
        XCODE_WORKSPACE: "iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          brew install cocoapods
          pod install --project-directory=iosApp

      - name: Build iOS app
        script: |
          xcodebuild build \
            -workspace $XCODE_WORKSPACE \
            -scheme $XCODE_SCHEME \
            -sdk iphoneos \
            -configuration Release

    artifacts:
      - build/ios/ipa/*.ipa